              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    UpdateAccountBody:
      properties:
        externalId:
          pattern: ^[0-9]{17,20}$
          type: string
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        password:
          maxLength: 19
          minLength: 4
          type: string
        roleUuid:
          format: uuid
          type: string
      type: object
    UpdateEventSchemaBody:
      properties:
        definition: {}
      required:
        - definition
      type: object
    UpdateGameModeBody:
      properties:
        description:
          anyOf:
            - maxLength: 128
              minLength: 1
              pattern: ^[a-z][a-z0-9.-]{0,127}$
              type: string
            - type: "null"
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        rank:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        title:
          anyOf:
            - maxLength: 128
              minLength: 1
              pattern: ^[a-z][a-z0-9.-]{0,127}$
              type: string
            - type: "null"
        visibility:
          enum:
            - visible
            - hidden
          type: string
      type: object
    UpdateMatchBody:
      properties:
        endedAt:
          minLength: 1
          type: string
        eventSchema:
          properties:
            id:
              format: uuid
              type: string
            version:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 1
                  type: integer
              minimum: 1
          required:
            - id
            - version
          type: object
        events:
          items:
            $ref: "#/components/schemas/MatchEventInput"
          type: array
        gameMode:
          $ref: "#/components/schemas/GameModeReference"
        initiatedAt:
          minLength: 1
          type: string
        score:
          properties:
            blue:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
            red:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
          required:
            - red
            - blue
          type: object
        status:
          enum:
            - ongoing
            - completed
          type: string
      type: object
    UpdatePermissionBody:
      properties:
        key:
          maxLength: 100
          minLength: 1
          pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
          type: string
        title:
          anyOf:
            - minLength: 1
              type: string
            - type: "null"
      type: object
    UpdateRoleBody:
      properties:
        name:
          maxLength: 25
          minLength: 1
          pattern: ^[a-z0-9-]+$
          type: string
        permissions:
          default: []
          items:
            anyOf:
              - maxLength: 100
                minLength: 1
                pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
                type: string
              - const: "*"
                type: string
          type: array
          uniqueItems: true
        title:
          minLength: 1
          type: string
      type: object
    UpdateRoomProgramBody:
      properties:
        description:
          anyOf:
            - minLength: 1
              type: string
            - type: "null"
          nullable: true
        haxballTokenEnvVar:
          maxLength: 64
          minLength: 1
          pattern: ^[A-Z_][A-Z0-9_]*$
          type: string
        integrationMode:
          enum:
            - external
            - integrated
          type: string
        launchConfigFields:
          items:
            $ref: "#/components/schemas/RoomLaunchConfigField"
          type: array
        releaseSource:
          properties:
            assetPattern:
              maxLength: 200
              minLength: 1
              type: string
            owner:
              maxLength: 80
              minLength: 1
              type: string
            repo:
              maxLength: 100
              minLength: 1
              type: string
          required:
            - owner
            - repo
            - assetPattern
          type: object
        title:
          anyOf:
            - minLength: 1
              type: string
            - type: "null"
          nullable: true
      type: object
    UpdateRoomProxyEndpointBody:
      properties:
        displayName:
          minLength: 1
          type: string
        enabled:
          type: boolean
        outboundIp:
          minLength: 1
          type: string
        proxyUrl:
          minLength: 1
          type: string
      type: object
    UploadRoomArtifactBody:
      properties:
        assetName:
          maxLength: 160
          minLength: 1
          pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*\.tgz$
          type: string
        branch:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9-]{0,63}$
          type: string
        file:
          default: File
          format: binary
          type: string
        sha:
          maxLength: 40
          minLength: 7
          pattern: ^[a-f0-9]{7,40}$
          type: string
      required:
        - branch
        - sha
        - assetName
        - file
      type: object
    UpsertRoomProgramVersionAliasBody:
      properties:
        version:
          maxLength: 80
          minLength: 1
          type: string
      required:
        - version
      type: object
    Value:
      properties:
        labels:
          items:
            properties:
              label:
                type: string
              language:
                properties:
                  code:
                    maxLength: 16
                    minLength: 2
                    pattern: ^[a-z]{2,3}(-[a-z0-9]{2,8})*$
                    type: string
                  createdAt:
                    type: string
                  name:
                    type: string
                  updatedAt:
                    type: string
                required:
                  - code
                  - name
                  - createdAt
                  - updatedAt
                type: object
            required:
              - language
              - label
            type: object
          type: array
        value:
          maxLength: 128
          minLength: 1
          pattern: ^[a-z][a-z0-9.-]{0,127}$
          type: string
      required:
        - value
        - labels
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
