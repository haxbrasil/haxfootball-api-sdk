components:
  schemas:
    Account:
      properties:
        createdAt:
          type: string
        externalId:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        updatedAt:
          type: string
        uuid:
          format: uuid
          type: string
      required:
        - uuid
        - name
        - externalId
        - role
        - createdAt
        - updatedAt
      type: object
    AddMatchEventBody:
      properties:
        actorPlayerId:
          maxLength: 64
          minLength: 1
          type: string
        domain:
          enum:
            - room
            - game
            - agent
            - system
          type: string
        elapsedSeconds:
          minimum: 0
          type: number
        occurredAt:
          minLength: 1
          type: string
        playId:
          maxLength: 128
          minLength: 1
          type: string
        roomPlayerId:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 0
              type: integer
          minimum: 0
        scope:
          enum:
            - player
            - team
            - match
          type: string
        sourceState:
          maxLength: 128
          minLength: 1
          type: string
        subjectPlayerId:
          maxLength: 64
          minLength: 1
          type: string
        team:
          enum:
            - spectators
            - red
            - blue
          type: string
        tick:
          minimum: 0
          type: number
        type:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        value: {}
      required:
        - domain
        - type
        - scope
        - value
      type: object
    AssociateMatchRecordingBody:
      properties:
        recordingId:
          minLength: 1
          type: string
      required:
        - recordingId
      type: object
    AssociatePlayerAccountBody:
      properties:
        accountUuid:
          format: uuid
          type: string
      required:
        - accountUuid
      type: object
    BadRequestError:
      properties:
        error:
          properties:
            code:
              const: BAD_REQUEST
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    BadRequestOrValidationError:
      anyOf:
        - $ref: "#/components/schemas/BadRequestError"
        - properties:
            error:
              properties:
                code:
                  const: VALIDATION_ERROR
                  type: string
                message:
                  type: string
              required:
                - code
                - message
              type: object
          required:
            - error
          type: object
    BulkUpsertValuesBody:
      properties:
        values:
          items:
            properties:
              label:
                minLength: 1
                type: string
              language:
                maxLength: 16
                minLength: 2
                pattern: ^[a-z]{2,3}(-[a-z0-9]{2,8})*$
                type: string
              value:
                maxLength: 128
                minLength: 1
                pattern: ^[a-z][a-z0-9.-]{0,127}$
                type: string
            required:
              - value
              - language
              - label
            type: object
          minItems: 1
          type: array
      required:
        - values
      type: object
    CloseRoomResponse:
      properties:
        closedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        createdAt:
          type: string
        failedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        failureReason:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        launchConfig:
          patternProperties:
            ^(.*)$:
              anyOf:
                - type: string
                - type: number
                - type: boolean
                - type: "null"
          type: object
        program:
          $ref: "#/components/schemas/RoomResponseProgramSummary"
        proxyEndpoint:
          anyOf:
            - $ref: "#/components/schemas/RoomResponseProxyEndpointSummary"
            - type: "null"
          nullable: true
        public:
          type: boolean
        roomLink:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        state:
          enum:
            - provisioning
            - running
            - closed
            - failed
          type: string
        updatedAt:
          type: string
        version:
          $ref: "#/components/schemas/RoomResponseVersionSummary"
      required:
        - id
        - program
        - version
        - state
        - roomLink
        - launchConfig
        - public
        - proxyEndpoint
        - createdAt
        - updatedAt
        - closedAt
        - failedAt
        - failureReason
      type: object
    ConfirmAccountBody:
      properties:
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        password:
          maxLength: 19
          minLength: 4
          type: string
      required:
        - name
        - password
      type: object
    ConfirmAccountResponse:
      properties:
        valid:
          type: boolean
      required:
        - valid
      type: object
    ConfirmSessionBody:
      allOf:
        - $ref: "#/components/schemas/ResolveSessionBody"
        - properties:
            password:
              maxLength: 19
              minLength: 4
              type: string
          required:
            - password
          type: object
      type: object
    ConfirmSessionResponse:
      anyOf:
        - properties:
            valid:
              const: false
              type: boolean
          required:
            - valid
          type: object
        - properties:
            account:
              $ref: "#/components/schemas/SessionAccount"
            canonicalName:
              type: string
            playerId:
              type: string
            valid:
              const: true
              type: boolean
          required:
            - valid
            - playerId
            - account
            - canonicalName
          type: object
    CreateAccountBody:
      properties:
        externalId:
          pattern: ^[0-9]{17,20}$
          type: string
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        password:
          maxLength: 19
          minLength: 4
          type: string
      required:
        - name
        - password
        - externalId
      type: object
    CreateEventSchemaBody:
      properties:
        definition: {}
        description:
          minLength: 1
          type: string
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        title:
          minLength: 1
          type: string
      required:
        - name
        - definition
      type: object
    CreateGameModeBody:
      properties:
        description:
          anyOf:
            - maxLength: 128
              minLength: 1
              pattern: ^[a-z][a-z0-9.-]{0,127}$
              type: string
            - type: "null"
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        rank:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        title:
          anyOf:
            - maxLength: 128
              minLength: 1
              pattern: ^[a-z][a-z0-9.-]{0,127}$
              type: string
            - type: "null"
        visibility:
          enum:
            - visible
            - hidden
          type: string
      required:
        - name
      type: object
    CreateMatchBody:
      properties:
        endedAt:
          minLength: 1
          type: string
        eventSchema:
          properties:
            id:
              format: uuid
              type: string
            version:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 1
                  type: integer
              minimum: 1
          required:
            - id
            - version
          type: object
        events:
          items:
            $ref: "#/components/schemas/MatchEventInput"
          type: array
        gameMode:
          $ref: "#/components/schemas/GameModeReference"
        initiatedAt:
          minLength: 1
          type: string
        recordingId:
          minLength: 1
          type: string
        score:
          properties:
            blue:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
            red:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
          required:
            - red
            - blue
          type: object
        status:
          enum:
            - ongoing
            - completed
          type: string
      required:
        - status
      type: object
    CreatePermissionBody:
      properties:
        key:
          maxLength: 100
          minLength: 1
          pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
          type: string
        title:
          anyOf:
            - minLength: 1
              type: string
            - type: "null"
      required:
        - key
      type: object
    CreatePlayerBody:
      properties:
        country:
          maxLength: 2
          minLength: 2
          pattern: ^[a-z]{2}$
          type: string
        externalId:
          maxLength: 64
          minLength: 1
          type: string
        name:
          maxLength: 25
          minLength: 1
          type: string
      required:
        - externalId
        - name
      type: object
    CreateRecordingBody:
      properties:
        file:
          default: File
          format: binary
          maxSize: 26214400
          type: string
      required:
        - file
      type: object
    CreateRoleBody:
      properties:
        name:
          maxLength: 25
          minLength: 1
          pattern: ^[a-z0-9-]+$
          type: string
        permissions:
          default: []
          items:
            anyOf:
              - maxLength: 100
                minLength: 1
                pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
                type: string
              - const: "*"
                type: string
          type: array
          uniqueItems: true
        title:
          minLength: 1
          type: string
      required:
        - name
        - title
      type: object
    CreateRoomBody:
      properties:
        haxballToken:
          minLength: 1
          type: string
        launchConfig:
          patternProperties:
            ^(.*)$:
              anyOf:
                - type: string
                - type: number
                - type: boolean
                - type: "null"
          type: object
        programId:
          format: uuid
          type: string
        version:
          minLength: 1
          type: string
      required:
        - programId
        - version
        - haxballToken
      type: object
    CreateRoomProgramBody:
      properties:
        description:
          minLength: 1
          type: string
        haxballTokenEnvVar:
          maxLength: 64
          minLength: 1
          pattern: ^[A-Z_][A-Z0-9_]*$
          type: string
        integrationMode:
          enum:
            - external
            - integrated
          type: string
        launchConfigFields:
          items:
            $ref: "#/components/schemas/RoomLaunchConfigField"
          type: array
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        releaseSource:
          $ref: "#/components/schemas/RoomProgramReleaseSource"
        title:
          minLength: 1
          type: string
      required:
        - name
        - releaseSource
        - integrationMode
      type: object
    CreateRoomProgramVersionBody:
      properties:
        artifact:
          $ref: "#/components/schemas/RoomProgramVersionArtifact"
        entrypoint:
          maxLength: 240
          minLength: 1
          type: string
        installStrategy:
          enum:
            - none
            - npm-ci
            - npm-install
          type: string
        version:
          maxLength: 80
          minLength: 1
          type: string
      required:
        - version
        - artifact
        - entrypoint
      type: object
    CreateRoomProxyEndpointBody:
      properties:
        displayName:
          minLength: 1
          type: string
        enabled:
          type: boolean
        key:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        outboundIp:
          minLength: 1
          type: string
        proxyUrl:
          minLength: 1
          type: string
      required:
        - key
        - displayName
        - outboundIp
        - proxyUrl
      type: object
    CreateTokenBody:
      properties:
        apiKey:
          minLength: 1
          type: string
      required:
        - apiKey
      type: object
    CreateTokenResponse:
      properties:
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
    DisableMatchEventBody:
      properties:
        disabled:
          const: true
          type: boolean
      required:
        - disabled
      type: object
    DiscoverRoomProgramVersionsBody:
      properties:
        entrypoint:
          maxLength: 240
          minLength: 1
          type: string
        installStrategy:
          enum:
            - none
            - npm-ci
            - npm-install
          type: string
      required:
        - entrypoint
      type: object
    DiscoverRoomProgramVersionsResponse:
      items:
        $ref: "#/components/schemas/RoomProgramVersion"
      type: array
    EventSchema:
      properties:
        createdAt:
          type: string
        definition: {}
        description:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        isLatest:
          type: boolean
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        title:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        updatedAt:
          type: string
        version:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 1
              type: integer
          minimum: 1
      required:
        - id
        - name
        - title
        - description
        - version
        - isLatest
        - definition
        - createdAt
        - updatedAt
      type: object
    EventSchemaReference:
      properties:
        id:
          format: uuid
          type: string
        version:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 1
              type: integer
          minimum: 1
      required:
        - id
        - version
      type: object
    GameMode:
      properties:
        createdAt:
          type: string
        description:
          anyOf:
            - properties:
                label:
                  type: string
                value:
                  type: string
              required:
                - value
                - label
              type: object
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        rank:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        title:
          anyOf:
            - properties:
                label:
                  type: string
                value:
                  type: string
              required:
                - value
                - label
              type: object
            - type: "null"
          nullable: true
        updatedAt:
          type: string
        visibility:
          enum:
            - visible
            - hidden
          type: string
      required:
        - id
        - name
        - title
        - description
        - visibility
        - rank
        - createdAt
        - updatedAt
      type: object
    GameModeReference:
      anyOf:
        - properties:
            id:
              format: uuid
              type: string
          required:
            - id
          type: object
        - properties:
            name:
              maxLength: 64
              minLength: 1
              pattern: ^[a-z][a-z0-9-]{0,63}$
              type: string
          required:
            - name
          type: object
    InternalServerError:
      properties:
        error:
          properties:
            code:
              const: INTERNAL_SERVER_ERROR
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    Job:
      properties:
        attempts:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        createdAt:
          type: string
        error: {}
        finishedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        lockedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        lockedBy:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        maxAttempts:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        payload: {}
        result: {}
        runAfter:
          type: string
        startedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        status:
          enum:
            - queued
            - running
            - succeeded
            - failed
            - canceled
          type: string
        type:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - type
        - status
        - attempts
        - maxAttempts
        - runAfter
        - lockedAt
        - lockedBy
        - startedAt
        - finishedAt
        - createdAt
        - updatedAt
      type: object
    JobSchedule:
      properties:
        createdAt:
          type: string
        enabled:
          type: boolean
        id:
          format: uuid
          type: string
        intervalSeconds:
          anyOf:
            - default: 0
              format: integer
              type: string
            - type: integer
        key:
          type: string
        lastEnqueuedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        nextRunAt:
          type: string
        payload: {}
        type:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - key
        - type
        - intervalSeconds
        - enabled
        - nextRunAt
        - lastEnqueuedAt
        - createdAt
        - updatedAt
      type: object
    ListAccounts:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Account"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListEventSchemas:
      properties:
        items:
          items:
            $ref: "#/components/schemas/EventSchema"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListGameModes:
      properties:
        items:
          items:
            $ref: "#/components/schemas/GameMode"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListJobSchedules:
      properties:
        items:
          items:
            $ref: "#/components/schemas/JobSchedule"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListJobs:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Job"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListLanguages:
      properties:
        items:
          items:
            properties:
              code:
                maxLength: 16
                minLength: 2
                pattern: ^[a-z]{2,3}(-[a-z0-9]{2,8})*$
                type: string
              createdAt:
                type: string
              name:
                type: string
              updatedAt:
                type: string
            required:
              - code
              - name
              - createdAt
              - updatedAt
            type: object
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListMatchEvents:
      properties:
        items:
          items:
            $ref: "#/components/schemas/MatchEvent"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListMatches:
      properties:
        items:
          items:
            $ref: "#/components/schemas/MatchSummary"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListPermissions:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Permission"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListPlayerMatches:
      properties:
        items:
          items:
            $ref: "#/components/schemas/MatchSummary"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListPlayers:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Player"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRecordings:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Recording"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoles:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Role"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProgramVersionAliases:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgramVersionAlias"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProgramVersions:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgramVersion"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomPrograms:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgram"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProxyEndpoints:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProxyEndpoint"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRooms:
      properties:
        items:
          items:
            $ref: "#/components/schemas/CloseRoomResponse"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    Match:
      allOf:
        - $ref: "#/components/schemas/MatchSummary"
        - properties:
            events:
              items:
                $ref: "#/components/schemas/MatchEvent"
              type: array
            participations:
              items:
                $ref: "#/components/schemas/MatchStint"
              type: array
          required:
            - events
            - participations
          type: object
      type: object
    MatchEvent:
      properties:
        actorPlayer:
          anyOf:
            - $ref: "#/components/schemas/Player"
            - type: "null"
          nullable: true
        createdAt:
          type: string
        disabled:
          type: boolean
        disabledAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        domain:
          enum:
            - room
            - game
            - agent
            - system
          type: string
        elapsedSeconds:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        occurredAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        playId:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        roomPlayerId:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        scope:
          enum:
            - player
            - team
            - match
          type: string
        sequence:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 1
              type: integer
          minimum: 1
        sourceState:
