      required:
        - definition
      type: object
    UploadRoomArtifactBody:
      properties:
        assetName:
          maxLength: 160
          minLength: 1
          pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*\.tgz$
          type: string
        branch:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9-]{0,63}$
          type: string
        file:
          default: File
          format: binary
          type: string
        sha:
          maxLength: 40
          minLength: 7
