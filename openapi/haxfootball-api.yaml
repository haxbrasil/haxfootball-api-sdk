        createdAt:
          type: string
        id:
          format: uuid
          type: string
        programId:
          format: uuid
          type: string
        updatedAt:
          type: string
        version:
          properties:
            id:
              format: uuid
              type: string
            version:
              minLength: 1
              type: string
          required:
            - id
            - version
          type: object
      required:
        - id
        - programId
        - alias
        - version
        - createdAt
        - updatedAt
      type: object
    RoomProgramVersionArtifact:
      properties:
        assetName:
          minLength: 1
          type: string
        assetUrl:
          minLength: 1
          type: string
        checksumSha256:
          maxLength: 64
          minLength: 64
          type: string
        publishedAt:
          minLength: 1
          type: string
        releaseId:
          minLength: 1
          type: string
        tagName:
          minLength: 1
          type: string
      required:
        - releaseId
        - tagName
        - assetName
        - assetUrl
        - publishedAt
      type: object
    RoomProxyEndpoint:
      properties:
        createdAt:
          type: string
        displayName:
          type: string
        enabled:
          type: boolean
