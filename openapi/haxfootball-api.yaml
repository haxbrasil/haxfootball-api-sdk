components:
  schemas:
    Account:
      properties:
        createdAt:
          type: string
        externalId:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        updatedAt:
          type: string
        uuid:
          format: uuid
          type: string
      required:
        - uuid
        - name
        - externalId
        - role
        - createdAt
        - updatedAt
      type: object
    AddMatchStatEventBody:
      properties:
        occurredAt:
          minLength: 1
          type: string
        playerId:
          maxLength: 64
          minLength: 1
          type: string
        tick:
          minimum: 0
          type: number
        type:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        value: {}
      required:
        - type
        - playerId
        - value
      type: object
    AppendMatchEventsBody:
      properties:
        events:
          items:
            $ref: "#/components/schemas/MatchEventInput"
          minItems: 1
          type: array
      required:
        - events
      type: object
    AssociateMatchRecordingBody:
      properties:
        recordingId:
          minLength: 1
          type: string
      required:
        - recordingId
      type: object
    AssociatePlayerAccountBody:
      properties:
        accountUuid:
          format: uuid
          type: string
      required:
        - accountUuid
      type: object
    BadRequestError:
      properties:
        error:
          properties:
            code:
              const: BAD_REQUEST
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    BadRequestOrValidationError:
      anyOf:
        - $ref: "#/components/schemas/BadRequestError"
        - properties:
            error:
              properties:
                code:
                  const: VALIDATION_ERROR
                  type: string
                message:
                  type: string
              required:
                - code
                - message
              type: object
          required:
            - error
          type: object
    CloseRoomResponse:
      properties:
        closedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        createdAt:
          type: string
        failedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        failureReason:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        launchConfig:
          patternProperties:
            ^(.*)$:
              anyOf:
                - type: string
                - type: number
                - type: boolean
                - type: "null"
          type: object
        program:
          $ref: "#/components/schemas/RoomResponseProgramSummary"
        proxyEndpoint:
          anyOf:
            - $ref: "#/components/schemas/RoomResponseProxyEndpointSummary"
            - type: "null"
          nullable: true
        public:
          type: boolean
        roomLink:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        state:
          enum:
            - provisioning
            - running
            - closed
            - failed
          type: string
        updatedAt:
          type: string
        version:
          $ref: "#/components/schemas/RoomResponseVersionSummary"
      required:
        - id
        - program
        - version
        - state
        - roomLink
        - launchConfig
        - public
        - proxyEndpoint
        - createdAt
        - updatedAt
        - closedAt
        - failedAt
        - failureReason
      type: object
    ConfirmAccountBody:
      properties:
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        password:
          maxLength: 19
          minLength: 4
          type: string
      required:
        - name
        - password
      type: object
    ConfirmAccountResponse:
      properties:
        valid:
          type: boolean
      required:
        - valid
      type: object
    ConfirmSessionBody:
      allOf:
        - $ref: "#/components/schemas/ResolveSessionBody"
        - properties:
            password:
              maxLength: 19
              minLength: 4
              type: string
          required:
            - password
          type: object
      type: object
    ConfirmSessionResponse:
      anyOf:
        - properties:
            valid:
              const: false
              type: boolean
          required:
            - valid
          type: object
        - properties:
            account:
              $ref: "#/components/schemas/SessionAccount"
            canonicalName:
              type: string
            playerId:
              type: string
            valid:
              const: true
              type: boolean
          required:
            - valid
            - playerId
            - account
            - canonicalName
          type: object
    CreateAccountBody:
      properties:
        externalId:
          pattern: ^[0-9]{17,20}$
          type: string
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        password:
          maxLength: 19
          minLength: 4
          type: string
      required:
        - name
        - password
        - externalId
      type: object
    CreateMatchBody:
      properties:
        endedAt:
          minLength: 1
          type: string
        events:
          items:
            $ref: "#/components/schemas/MatchEventInput"
          type: array
        initiatedAt:
          minLength: 1
          type: string
        recordingId:
          minLength: 1
          type: string
        score:
          properties:
            blue:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
            red:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 0
                  type: integer
              minimum: 0
          required:
            - red
            - blue
          type: object
        statEventSchema:
          properties:
            id:
              format: uuid
              type: string
            version:
              anyOf:
                - default: 0
                  format: integer
                  type: string
                - minimum: 1
                  type: integer
              minimum: 1
          required:
            - id
            - version
          type: object
        status:
          enum:
            - ongoing
            - completed
          type: string
      required:
        - status
      type: object
    CreatePermissionBody:
      properties:
        key:
          maxLength: 100
          minLength: 1
          pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
          type: string
        title:
          anyOf:
            - minLength: 1
              type: string
            - type: "null"
      required:
        - key
      type: object
    CreatePlayerBody:
      properties:
        country:
          maxLength: 2
          minLength: 2
          pattern: ^[a-z]{2}$
          type: string
        externalId:
          maxLength: 64
          minLength: 1
          type: string
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
      required:
        - externalId
        - name
      type: object
    CreateRecordingBody:
      properties:
        file:
          default: File
          format: binary
          maxSize: 26214400
          type: string
      required:
        - file
      type: object
    CreateRoleBody:
      properties:
        name:
          maxLength: 25
          minLength: 1
          pattern: ^[a-z0-9-]+$
          type: string
        permissions:
          default: []
          items:
            maxLength: 100
            minLength: 1
            pattern: ^[a-z][a-z0-9-]*:[a-z][a-z0-9-]*$
            type: string
          type: array
          uniqueItems: true
        title:
          minLength: 1
          type: string
      required:
        - name
        - title
      type: object
    CreateRoomBody:
      properties:
        haxballToken:
          minLength: 1
          type: string
        launchConfig:
          patternProperties:
            ^(.*)$:
              anyOf:
                - type: string
                - type: number
                - type: boolean
                - type: "null"
          type: object
        programId:
          format: uuid
          type: string
        version:
          minLength: 1
          type: string
      required:
        - programId
        - version
        - haxballToken
      type: object
    CreateRoomProgramBody:
      properties:
        description:
          minLength: 1
          type: string
        haxballTokenEnvVar:
          maxLength: 64
          minLength: 1
          pattern: ^[A-Z_][A-Z0-9_]*$
          type: string
        integrationMode:
          enum:
            - external
            - integrated
          type: string
        launchConfigFields:
          items:
            $ref: "#/components/schemas/RoomLaunchConfigField"
          type: array
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        releaseSource:
          $ref: "#/components/schemas/RoomProgramReleaseSource"
        title:
          minLength: 1
          type: string
      required:
        - name
        - releaseSource
        - integrationMode
      type: object
    CreateRoomProgramVersionBody:
      properties:
        artifact:
          $ref: "#/components/schemas/RoomProgramVersionArtifact"
        entrypoint:
          maxLength: 240
          minLength: 1
          type: string
        installStrategy:
          enum:
            - none
            - npm-ci
            - npm-install
          type: string
        version:
          maxLength: 80
          minLength: 1
          type: string
      required:
        - version
        - artifact
        - entrypoint
      type: object
    CreateRoomProxyEndpointBody:
      properties:
        displayName:
          minLength: 1
          type: string
        enabled:
          type: boolean
        key:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        outboundIp:
          minLength: 1
          type: string
        proxyUrl:
          minLength: 1
          type: string
      required:
        - key
        - displayName
        - outboundIp
        - proxyUrl
      type: object
    CreateStatEventSchemaBody:
      properties:
        definition: {}
        description:
          minLength: 1
          type: string
        name:
          maxLength: 64
          minLength: 1
          pattern: ^[a-z][a-z0-9-]{0,63}$
          type: string
        title:
          minLength: 1
          type: string
      required:
        - name
        - definition
      type: object
    CreateTokenBody:
      properties:
        apiKey:
          minLength: 1
          type: string
      required:
        - apiKey
      type: object
    CreateTokenResponse:
      properties:
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
    DisableMatchStatEventBody:
      properties:
        disabled:
          const: true
          type: boolean
      required:
        - disabled
      type: object
    DiscoverRoomProgramVersionsBody:
      properties:
        entrypoint:
          maxLength: 240
          minLength: 1
          type: string
        installStrategy:
          enum:
            - none
            - npm-ci
            - npm-install
          type: string
      required:
        - entrypoint
      type: object
    DiscoverRoomProgramVersionsResponse:
      items:
        $ref: "#/components/schemas/RoomProgramVersion"
      type: array
    InternalServerError:
      properties:
        error:
          properties:
            code:
              const: INTERNAL_SERVER_ERROR
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    ListAccounts:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Account"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListMatchStatEvents:
      properties:
        items:
          items:
            $ref: "#/components/schemas/MatchStatEvent"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListMatches:
      properties:
        items:
          items:
            $ref: "#/components/schemas/MatchSummary"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListPermissions:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Permission"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListPlayers:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Player"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRecordings:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Recording"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoles:
      properties:
        items:
          items:
            $ref: "#/components/schemas/Role"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProgramVersionAliases:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgramVersionAlias"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProgramVersions:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgramVersion"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomPrograms:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProgram"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRoomProxyEndpoints:
      properties:
        items:
          items:
            $ref: "#/components/schemas/RoomProxyEndpoint"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListRooms:
      properties:
        items:
          items:
            $ref: "#/components/schemas/CloseRoomResponse"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    ListStatEventSchemas:
      properties:
        items:
          items:
            $ref: "#/components/schemas/StatEventSchema"
          type: array
        page:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - page
      type: object
    Match:
      allOf:
        - $ref: "#/components/schemas/MatchSummary"
        - properties:
            events:
              items:
                $ref: "#/components/schemas/MatchEvent"
              type: array
            participations:
              items:
                $ref: "#/components/schemas/MatchStint"
              type: array
          required:
            - events
            - participations
          type: object
      type: object
    MatchEvent:
      properties:
        elapsedSeconds:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        occurredAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        player:
          $ref: "#/components/schemas/Player"
        roomPlayerId:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        sequence:
          type: number
        team:
          anyOf:
            - anyOf:
                - const: spectators
                  type: string
                - const: red
                  type: string
                - const: blue
                  type: string
            - type: "null"
          nullable: true
        type:
          enum:
            - player_join
            - player_leave
            - player_team_change
          type: string
      required:
        - sequence
        - type
        - player
        - team
        - roomPlayerId
        - occurredAt
        - elapsedSeconds
      type: object
    MatchEventInput:
      properties:
        elapsedSeconds:
          minimum: 0
          type: number
        occurredAt:
          minLength: 1
          type: string
        playerId:
          maxLength: 64
          minLength: 1
          type: string
        roomPlayerId:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 0
              type: integer
          minimum: 0
        team:
          enum:
            - spectators
            - red
            - blue
          type: string
        type:
          enum:
            - player_join
            - player_leave
            - player_team_change
          type: string
      required:
        - type
        - playerId
      type: object
    MatchMetrics:
      items:
        properties:
          metrics:
            patternProperties:
              ^(.*)$: {}
            type: object
          player:
            $ref: "#/components/schemas/Player"
        required:
          - player
          - metrics
        type: object
      type: array
    MatchScore:
      properties:
        blue:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 0
              type: integer
          minimum: 0
        red:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 0
              type: integer
          minimum: 0
      required:
        - red
        - blue
      type: object
    MatchStatEvent:
      properties:
        createdAt:
          type: string
        disabled:
          type: boolean
        disabledAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          format: uuid
          type: string
        occurredAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        player:
          $ref: "#/components/schemas/Player"
        sequence:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 1
              type: integer
          minimum: 1
        tick:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        type:
          type: string
        updatedAt:
          type: string
        value: {}
      required:
        - id
        - sequence
        - type
        - player
        - value
        - occurredAt
        - tick
        - disabled
        - disabledAt
        - createdAt
        - updatedAt
      type: object
    MatchStint:
      properties:
        joinedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        joinedElapsedSeconds:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        leftAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        leftElapsedSeconds:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        player:
          $ref: "#/components/schemas/Player"
        roomPlayerId:
          anyOf:
            - type: number
            - type: "null"
          nullable: true
        team:
          enum:
            - red
            - blue
          type: string
      required:
        - player
        - team
        - roomPlayerId
        - joinedAt
        - leftAt
        - joinedElapsedSeconds
        - leftElapsedSeconds
      type: object
    MatchSummary:
      properties:
        createdAt:
          type: string
        endedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        id:
          maxLength: 8
          minLength: 8
          pattern: ^[a-z2-9]{8}$
          type: string
        initiatedAt:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        recording:
          anyOf:
            - $ref: "#/components/schemas/Recording"
            - type: "null"
          nullable: true
        score:
          anyOf:
            - $ref: "#/components/schemas/MatchScore"
            - type: "null"
          nullable: true
        statEventSchema:
          anyOf:
            - $ref: "#/components/schemas/StatEventSchemaReference"
            - type: "null"
          nullable: true
        status:
          enum:
            - ongoing
            - completed
          type: string
        updatedAt:
          type: string
      required:
        - id
        - status
        - initiatedAt
        - endedAt
        - score
        - recording
        - statEventSchema
        - createdAt
        - updatedAt
      type: object
    NotFoundError:
      properties:
        error:
          properties:
            code:
              const: NOT_FOUND
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - error
      type: object
    PageInfo:
      properties:
        limit:
          anyOf:
            - default: 0
              format: integer
              type: string
            - maximum: 100
              minimum: 1
              type: integer
          maximum: 100
          minimum: 1
        nextCursor:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
      required:
        - limit
        - nextCursor
      type: object
    Permission:
      properties:
        createdAt:
          type: string
        key:
          type: string
        title:
          anyOf:
            - type: string
            - type: "null"
        updatedAt:
          type: string
        uuid:
          format: uuid
          type: string
      required:
        - uuid
        - key
        - title
        - createdAt
        - updatedAt
      type: object
    Player:
      properties:
        account:
          anyOf:
            - $ref: "#/components/schemas/PlayerAccount"
            - type: "null"
          nullable: true
        country:
          anyOf:
            - type: string
            - type: "null"
          nullable: true
        createdAt:
          type: string
        id:
          type: string
        name:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - country
        - account
        - createdAt
        - updatedAt
      type: object
    PlayerAccount:
      properties:
        externalId:
          type: string
        name:
          type: string
        uuid:
          format: uuid
          type: string
      required:
        - uuid
        - name
        - externalId
      type: object
    PublishStatEventSchemaVersionBody:
      properties:
        definition: {}
      required:
        - definition
      type: object
    Recording:
      properties:
        createdAt:
          type: string
        id:
          maxLength: 64
          minLength: 7
          pattern: ^[a-f0-9]+$
          type: string
        sizeBytes:
          type: number
        url:
          type: string
      required:
        - id
        - url
        - sizeBytes
        - createdAt
      type: object
    RemovePermissionResponse:
      properties:
        deleted:
          type: boolean
      required:
        - deleted
      type: object
    RemoveRoleResponse:
      properties:
        deleted:
          type: boolean
      required:
        - deleted
      type: object
    ReportRoomReadyBody:
      properties:
        commId:
          minLength: 32
          type: string
        roomLink:
          minLength: 1
          type: string
      required:
        - commId
        - roomLink
      type: object
    ResolveSessionBody:
      properties:
        auth:
          anyOf:
            - maxLength: 256
              minLength: 1
              type: string
            - type: "null"
          nullable: true
        conn:
          anyOf:
            - maxLength: 256
              minLength: 1
              type: string
            - type: "null"
          nullable: true
        name:
          maxLength: 25
          minLength: 1
          pattern: .*[A-Za-z0-9].*
          type: string
        roomId:
          maxLength: 64
          minLength: 1
          type: string
        roomPlayerId:
          anyOf:
            - default: 0
              format: integer
              type: string
            - minimum: 0
              type: integer
          minimum: 0
      required:
        - roomId
        - roomPlayerId
        - name
        - auth
        - conn
      type: object
    ResolveSessionResponse:
      anyOf:
        - properties:
            account:
              type: "null"
            playerId:
              type: string
            status:
              const: guest
              type: string
          required:
            - status
            - playerId
            - account
          type: object
        - properties:
            account:
              $ref: "#/components/schemas/SessionAccount"
            canonicalName:
              type: string
            playerId:
              type: string
            status:
              const: signed_in
              type: string
          required:
            - status
            - playerId
            - account
            - canonicalName
          type: object
        - properties:
            account:
              $ref: "#/components/schemas/SessionAccount"
            playerId:
              type: string
            status:
              const: password_required
              type: string
          required:
            - status
            - playerId
